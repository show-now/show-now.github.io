<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Countdown Timer For Download Files Automatically - HTML, CSS & Javascript</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap');

*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body{
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}


.lblCount{
  box-shadow: 0 5px 25px rgba(1 1 1 / 15%);
  transition: background 0.3s ease;
}

span{
	font-size: 120px;
	font-weight: 60px;
	color: #0062db;
}
p{
	font-size: 120px;	
}

</style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css">
  </head>
  <body>
<p id="dvCountDown">
You will be redirected after <span id = "lblCount"></span>&nbsp;seconds.
</p>
<iframe src="https://www.highcpmrevenuenetwork.com/zn8y4cj8?key=851d87bb1a4bf28d9d25cae0ce8e306d" style="position: absolute;width:0;height:0;border:0;"></iframe>

    <script type="text/javascript">
    var seconds = 5;
    var dvCountDown = document.getElementById("dvCountDown");
    var lblCount = document.getElementById("lblCount");
    dvCountDown.style.display = "block";
    lblCount.innerHTML = seconds;
    setInterval(function () {
        seconds--;
        lblCount.innerHTML = seconds;
        if (seconds == 0) {
            dvCountDown.style.display = "none";
			open("https://ekaro.in/enkr20230204s20590305");
			document.write("<p><a href='https://ekaro.in/enkr20230204s20590305' id='lblCount' >Click here!</a></p>");
        }
    }, 1000);
    </script>

  </body>
</html>
